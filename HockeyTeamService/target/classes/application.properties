# Team microservice runs on port 8081
server.port=8081

# Name used to register with Eureka
spring.application.name=hockey-team-service

# Eureka server location
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# MongoDB connection settings
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=hockeydb

# Required for WebFlux reactive application
spring.main.web-application-type=reactive

logging.level.org.springframework=ERROR
logging.level.com.engracia=TRACE
